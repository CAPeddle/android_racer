<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 384" width="860" height="384" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Difficulty ramp across the 3-level campaign</title>
  <desc id="d">Small multiples: police cars (3, 4, 6), police chase speed (240, 320, 380 vs the player's top speed of 450), and coins to collect (6, 9, 12) for Levels 1, 2 and 3. Level 1 is a no-lose practice level.</desc>
  <style>
    :root{
      --surface:#fcfcfb; --ink:#1a1a19; --muted:#6b6b68; --axis:#d9d9d5;
      --l1:#2563eb; --l2:#f97316; --l3:#7c3aed; --ref:#b91c1c;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --surface:#1a1a19; --ink:#f2f2ef; --muted:#a3a3a0; --axis:#3a3a38;
        --l1:#4d8df0; --l2:#e06a10; --l3:#9a6ae0; --ref:#f87171;
      }
    }
    :root[data-theme="light"]{
      --surface:#fcfcfb; --ink:#1a1a19; --muted:#6b6b68; --axis:#d9d9d5;
      --l1:#2563eb; --l2:#f97316; --l3:#7c3aed; --ref:#b91c1c;
    }
    :root[data-theme="dark"]{
      --surface:#1a1a19; --ink:#f2f2ef; --muted:#a3a3a0; --axis:#3a3a38;
      --l1:#4d8df0; --l2:#e06a10; --l3:#9a6ae0; --ref:#f87171;
    }
    .surface{fill:var(--surface);}
    .title{fill:var(--ink); font-size:20px; font-weight:700;}
    .panel{fill:var(--ink); font-size:15px; font-weight:600;}
    .val{fill:var(--ink); font-size:15px; font-weight:700;}
    .cat{fill:var(--muted); font-size:14px;}
    .leg{fill:var(--ink); font-size:14px;}
    .cap{fill:var(--muted); font-size:12px;}
    .axis{stroke:var(--axis); stroke-width:1.5;}
    .ref{stroke:var(--ref); stroke-width:2; stroke-dasharray:6 5;}
    .reftx{fill:var(--ref); font-size:12px; font-weight:600;}
    .l1{fill:var(--l1);} .l2{fill:var(--l2);} .l3{fill:var(--l3);}
  </style>

  <rect class="surface" x="0" y="0" width="860" height="384" rx="10"/>
  <text class="title" x="30" y="34">Difficulty ramp across the 3-level campaign</text>

  <!-- legend: color follows the level, shared across panels -->
  <g transform="translate(30,52)">
    <rect class="l1" x="0" y="0" width="14" height="14" rx="3"/><text class="leg" x="20" y="12">Level 1 (practice)</text>
    <rect class="l2" x="180" y="0" width="14" height="14" rx="3"/><text class="leg" x="200" y="12">Level 2</text>
    <rect class="l3" x="300" y="0" width="14" height="14" rx="3"/><text class="leg" x="320" y="12">Level 3</text>
  </g>

  <!-- Panel A: police cars (scale 0..6) -->
  <text class="panel" x="55" y="98">Police cars</text>
  <line class="axis" x1="50" y1="290" x2="232" y2="290"/>
  <rect class="l1" x="55"  y="195.0" width="46" height="95.0"  rx="4"/>
  <rect class="l2" x="118" y="163.3" width="46" height="126.7" rx="4"/>
  <rect class="l3" x="181" y="100.0" width="46" height="190.0" rx="4"/>
  <text class="val" x="78"  y="187" text-anchor="middle">3</text>
  <text class="val" x="141" y="155" text-anchor="middle">4</text>
  <text class="val" x="204" y="92"  text-anchor="middle">6</text>
  <text class="cat" x="78"  y="310" text-anchor="middle">L1</text>
  <text class="cat" x="141" y="310" text-anchor="middle">L2</text>
  <text class="cat" x="204" y="310" text-anchor="middle">L3</text>

  <!-- Panel B: police speed (scale 0..470; reference: player top speed 450) -->
  <text class="panel" x="350" y="98">Police speed</text>
  <line class="axis" x1="345" y1="290" x2="527" y2="290"/>
  <line class="ref" x1="345" y1="108.1" x2="527" y2="108.1"/>
  <text class="reftx" x="345" y="103">player top speed 450</text>
  <rect class="l1" x="350" y="193.0" width="46" height="97.0"  rx="4"/>
  <rect class="l2" x="413" y="160.6" width="46" height="129.4" rx="4"/>
  <rect class="l3" x="476" y="136.4" width="46" height="153.6" rx="4"/>
  <text class="val" x="373" y="185" text-anchor="middle">240</text>
  <text class="val" x="436" y="153" text-anchor="middle">320</text>
  <text class="val" x="499" y="128" text-anchor="middle">380</text>
  <text class="cat" x="373" y="310" text-anchor="middle">L1</text>
  <text class="cat" x="436" y="310" text-anchor="middle">L2</text>
  <text class="cat" x="499" y="310" text-anchor="middle">L3</text>

  <!-- Panel C: coins to collect (scale 0..13) -->
  <text class="panel" x="645" y="98">Coins to collect</text>
  <line class="axis" x1="640" y1="290" x2="822" y2="290"/>
  <rect class="l1" x="645" y="202.3" width="46" height="87.7"  rx="4"/>
  <rect class="l2" x="708" y="158.5" width="46" height="131.5" rx="4"/>
  <rect class="l3" x="771" y="114.6" width="46" height="175.4" rx="4"/>
  <text class="val" x="668" y="194" text-anchor="middle">6</text>
  <text class="val" x="731" y="150" text-anchor="middle">9</text>
  <text class="val" x="794" y="107" text-anchor="middle">12</text>
  <text class="cat" x="668" y="310" text-anchor="middle">L1</text>
  <text class="cat" x="731" y="310" text-anchor="middle">L2</text>
  <text class="cat" x="794" y="310" text-anchor="middle">L3</text>

  <text class="cap" x="30" y="352">Each panel has its own scale (small multiples). Level 1 is a no-lose practice level — police chase for flavour but can't catch.</text>
  <text class="cap" x="30" y="370">Police speed stays below the player's 450 top speed on every level, so the campaign is always escapable.</text>
</svg>
